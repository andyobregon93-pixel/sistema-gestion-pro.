<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        /* Login Design */
        #loginScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; }
        
        /* Dashboard */
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; }
        
        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 20px; }
        .entrega-box { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid var(--success); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>BIENVENIDO</h2>
            <p>Ingresa tus credenciales</p>
            <input type="email" id="logEmail" placeholder="Correo electrónico">
            <input type="password" id="logPass" placeholder="Contraseña">
            <button class="btn-add" onclick="validarAcceso()">Entrar al Sistema</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <button style="background:transparent; color:var(--primary)" onclick="abrirInterfazCliente()">Soy Cliente (Ver mi cuenta)</button>
        </div>
    </div>

    <!-- PANEL ADMIN (SOLO ANDY) -->
    <div id="adminDashboard" class="hidden">
        <header>
            <h2>SISTEMA GESTIÓN PRO</h2>
            <small>Admin: <b>Andy Obregón</b></small>
            <button onclick="location.reload()" style="width:auto; padding:5px 10px; font-size:10px; background:var(--danger)">Salir</button>
        </header>

        <div class="grid-menu">
            <div class="card" onclick="abrirModal('modalVentas', cargarDatosAdmin)">📦 Registrar Venta / Entrega</div>
            <div class="card" onclick="abrirModal('modalAdmin')">⚙️ Panel Productos</div>
        </div>
    </div>

    <!-- INTERFAZ CLIENTE -->
    <div id="clienteDashboard" class="hidden">
        <header>
            <h2>RECLAMAR MI CUENTA</h2>
            <p>Ingresa tu WhatsApp para ver tu pedido</p>
        </header>
        <div style="padding: 20px;">
            <input type="text" id="wsCliente" placeholder="Ej: 0987654321">
            <button class="btn-add" id="btnConsultarCuenta">Ver mis Datos</button>
            <div id="resultadoEntrega"></div>
            <button class="btn-cerrar" onclick="location.reload()">Volver</button>
        </div>
    </div>

    <!-- MODAL VENTAS (ADMIN) -->
    <div id="modalVentas" class="modal">
        <div class="modal-content">
            <h3>Entregar Cuenta</h3>
            <input type="text" id="wsRegistro" placeholder="WhatsApp del Cliente">
            <input type="text" id="plataformaReg" placeholder="Nombre de Plataforma">
            <input type="text" id="datosCuenta" placeholder="Correo:Clave de la cuenta">
            <button class="btn-add" id="btnRegistrarVenta">Autorizar Entrega</button>
            <button class="btn-cerrar" onclick="cerrarModal('modalVentas')">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DE ACCESO ---
        window.validarAcceso = () => {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;

            if(email === "Andyobregon799@gmail.com" && pass === "123456") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else {
                alert("Acceso denegado. Solo Andy puede entrar aquí.");
            }
        };

        window.abrirInterfazCliente = () => {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('clienteDashboard').classList.remove('hidden');
        };

        // --- FUNCIONES ADMIN ---
        window.abrirModal = (id) => document.getElementById(id).style.display = "block";
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";

        document.getElementById('btnRegistrarVenta').onclick = async () => {
            const ws = document.getElementById('wsRegistro').value;
            const plat = document.getElementById('plataformaReg').value;
            const info = document.getElementById('datosCuenta').value;

            if(!ws || !info) return alert("Faltan datos");

            await addDoc(collection(db, "entregas"), {
                whatsapp: ws,
                plataforma: plat,
                datos: info,
                fecha: new Date()
            });
            alert("Cuenta autorizada para el cliente");
            cerrarModal('modalVentas');
        };

        // --- FUNCIONES CLIENTE ---
        document.getElementById('btnConsultarCuenta').onclick = async () => {
            const ws = document.getElementById('wsCliente').value;
            const res = document.getElementById('resultadoEntrega');
            res.innerHTML = "Buscando...";

            const q = query(collection(db, "entregas"), where("whatsapp", "==", ws));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                res.innerHTML = "<p style='color:red'>No hay cuentas autorizadas para este número.</p>";
            } else {
                res.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    res.innerHTML += `
                        <div class="entrega-box">
                            <h4 style="color:var(--success)">¡Cuenta Lista!</h4>
                            <p><b>Plataforma:</b> ${d.plataforma}</p>
                            <p><b>Tus Datos:</b> <br><span style="background:#fff; color:#000; padding:2px 5px">${d.datos}</span></p>
                        </div>
                    `;
                });
            }
        };
    </script>
</body>
</html>
