<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO - ANDY</title>
    <style>
        :root { --primary: #2563eb; --bg: #0b141a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; --wa-bg: #0b141a; --wa-msg-in: #202c33; --wa-msg-out: #005c4b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; font-size: 0.8rem; }
        
        /* CHAT WHATSAPP STYLE */
        #chatBox { background: var(--wa-bg); height: 400px; overflow-y: auto; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; display: flex; flex-direction: column; background-image: radial-gradient(#ffffff10 1px, transparent 1px); background-size: 20px 20px; }
        .msg-container { display: flex; align-items: flex-end; margin-bottom: 8px; gap: 8px; width: 100%; }
        .msg-a-container { flex-direction: row-reverse; }
        .pfp-mini { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #334155; border: 1px solid var(--primary); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; max-width: 70%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); cursor: pointer; }
        .msg-v { background: var(--wa-msg-in); border-bottom-left-radius: 2px; }
        .msg-a { background: var(--wa-msg-out); border-bottom-right-radius: 2px; }
        .msg-info { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 4px; }
        .msg-time { font-size: 0.65rem; color: #94a3b8; text-align: right; }
        .reply-box { background: rgba(0,0,0,0.2); border-left: 3px solid var(--success); padding: 5px; margin-bottom: 5px; font-size: 0.75rem; border-radius: 4px; color: #cbd5e1; }
        
        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO (ADMIN Y MIEMBROS) -->
    <div id="loginScreen">
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
            <div style="background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid var(--primary); width:100%; max-width:350px; text-align:center;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo">
                <input type="password" id="logPass" placeholder="Clave">
                <button class="btn-add" onclick="validarAcceso()">ENTRAR</button>
                <div style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">Admin o Miembro Registrado</div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <div id="mainDashboard" class="hidden">
        <header><h3 id="welcomeUser">BIENVENIDO</h3></header>
        <div class="grid-menu">
            <div class="card" onclick="checkChatAccess()">💬 Chat VIP</div>
            <div id="adminTools" class="hidden" style="display: contents;">
                <div class="card" onclick="abrirModal('modalAdminMiembros', cargarTodosLosMiembros)">👥 Miembros</div>
                <div class="card" onclick="abrirModal('modalClientes', cargarClientes)">👥 Mis Clientes</div>
                <div class="card" onclick="abrirModal('modalPlataformas', cargarPlataformas)">📺 Plataformas</div>
                <div class="card" onclick="abrirModal('modalVendedores', cargarVendedores)" style="grid-column: span 2;">⚙️ Configuración Usuarios</div>
            </div>
        </div>
        <button onclick="cerrarSesion()" style="background:var(--danger); width:80%; margin:20px auto; display:block;">SALIR</button>
    </div>

    <!-- MODAL REGISTRO DE PERFIL (PARA EL CHAT) -->
    <div id="modalProfiles" class="modal"><div class="modal-content"><h3>Elige tu Perfil</h3><div id="profilesList"></div><button class="btn-add" onclick="abrirRegistroNuevo()">+ REGISTRARME</button></div></div>
    
    <div id="chatRegister" class="modal">
        <div class="modal-content">
            <h3 id="regTitle">Datos de Chat</h3>
            <input type="text" id="chatNick" placeholder="Tu Apodo">
            <input type="text" id="chatPhone" placeholder="WhatsApp">
            <p style="font-size: 0.7rem;">Foto de Perfil:</p>
            <input type="file" id="chatImg" accept="image/*">
            <button class="btn-add" onclick="finalizarRegistroChat()">GUARDAR Y ENTRAR</button>
            <button class="btn-cerrar" onclick="cerrarModal('chatRegister')">CANCELAR</button>
        </div>
    </div>

    <!-- CHAT VIP TIPO WHATSAPP -->
    <div id="modalChat" class="modal">
        <div class="modal-content" style="max-width: 600px; height: 90vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
                <div id="statusIndicator" style="font-size: 0.8rem; font-weight: bold;"></div>
                <button style="width:auto; font-size:0.7rem; background:#4f46e5; padding:5px 10px;" onclick="abrirEdicionPerfil()">⚙️ FOTO</button>
            </div>
            <div id="chatBox"></div>
            <!-- PREVIEW DE RESPUESTA -->
            <div id="replyPreviewContainer" class="hidden" style="background:#1e293b; padding:10px; border-left:4px solid var(--success);">
                <div id="replyText" style="font-size:0.8rem;"></div>
                <button onclick="cancelarRespuesta()" style="background:var(--danger); height:20px; width:20px; padding:0; float:right;">X</button>
            </div>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="text" id="msgInput" placeholder="Mensaje...">
                <button class="btn-add" style="width: 60px;" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-cerrar" onclick="cerrarModal('modalChat')">SALIR</button>
        </div>
    </div>

    <!-- MODALES DE ADMIN -->
    <div id="modalVendedores" class="modal"><div class="modal-content"><h3>Usuarios del Sistema</h3><input type="text" id="uN" placeholder="Nombre"><input type="email" id="uE" placeholder="Correo"><input type="text" id="uP" placeholder="Clave"><select id="uR"><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select><button class="btn-add" onclick="guardarUsuario()">CREAR</button><div id="listaU" style="margin-top:10px;"></div><button class="btn-cerrar" onclick="cerrarModal('modalVendedores')">VOLVER</button></div></div>
    <div id="modalPlataformas" class="modal"><div class="modal-content"><h3>Plataformas</h3><input type="text" id="pN" placeholder="Nombre"><input type="number" id="pP" placeholder="Precio"><button class="btn-add" onclick="guardarPlataforma()">AÑADIR</button><div id="listaP" style="margin-top:10px;"></div><button class="btn-cerrar" onclick="cerrarModal('modalPlataformas')">VOLVER</button></div></div>
    <div id="modalClientes" class="modal"><div class="modal-content"><h3>Clientes</h3><input type="text" id="cN" placeholder="Nombre"><input type="text" id="cW" placeholder="WhatsApp"><button class="btn-add" onclick="guardarCliente()">GUARDAR</button><div id="listaC" style="margin-top:10px;"></div><button class="btn-cerrar" onclick="cerrarModal('modalClientes')">VOLVER</button></div></div>
    <div id="modalAdminMiembros" class="modal"><div class="modal-content"><h3>Estado Miembros Chat</h3><div id="fullMembersList"></div><button class="btn-cerrar" onclick="cerrarModal('modalAdminMiembros')">CERRAR</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userChat = { id: localStorage.getItem('chatUserId') || "", nick: localStorage.getItem('chatNick') || "", foto: localStorage.getItem('chatFoto') || "" };
        let respuestaActiva = null;
        let esEdicion = false;

        const colores = ['#ff9f43', '#ee5253', '#10ac84', '#5f27cd', '#0abde3', '#f368e0'];
        const getCol = (str) => colores[str.length % colores.length];

        window.abrirModal = (id, cb) => { document.getElementById(id).style.display = "block"; if(cb) cb(); };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";
        async function toBase64(file) { return new Promise((r, j) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => r(reader.result); reader.onerror = e => j(e); }); }

        // --- LOGIN INTEGRADO ---
        window.validarAcceso = async () => {
            const correo = document.getElementById('logEmail').value;
            const clave = document.getElementById('logPass').value;
            
            if(correo === "Andyobregon799@gmail.com" && clave === "123456") {
                mostrarDashboard("ADMIN", true);
                return;
            }

            const s = await getDocs(collection(db, "usuarios"));
            let encontrado = false;
            s.forEach(d => {
                const u = d.data();
                if(u.correo === correo && u.clave === clave) {
                    mostrarDashboard(u.nombre, u.rol === "admin");
                    encontrado = true;
                }
            });
            if(!encontrado) alert("Credenciales incorrectas");
        };

        function mostrarDashboard(nombre, esAdmin) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = "HOLA, " + nombre;
            if(esAdmin) document.getElementById('adminTools').classList.remove('hidden');
        }

        window.cerrarSesion = () => { location.reload(); };

        // --- LÓGICA DE ESTADO ONLINE ---
        async function setOnline(status) {
            if(userChat.id) { await updateDoc(doc(db, "miembros_chat", userChat.id), { online: status }); }
        }

        // --- CHAT Y RECONOCIMIENTO ---
        window.checkChatAccess = () => { if(userChat.id) { abrirChat(); setOnline(true); } else cargarListaPerfiles(); };

        async function cargarListaPerfiles() {
            const list = document.getElementById('profilesList'); list.innerHTML = ""; abrirModal('modalProfiles');
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach(dSnap => {
                const d = dSnap.data();
                const div = document.createElement('div');
                div.style = "background:#202c33; padding:10px; margin-bottom:8px; border-radius:10px; cursor:pointer; display:flex; align-items:center; gap:10px;";
                div.innerHTML = `<img src="${d.foto || ''}" class="pfp-mini" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"> <div><b>${d.nick}</b> <span style="color:${d.online?'#22c55e':'#ef4444'}">●</span></div>`;
                div.onclick = () => { userChat = { id: dSnap.id, nick: d.nick, foto: d.foto }; localStorage.setItem('chatUserId', dSnap.id); abrirChat(); setOnline(true); cerrarModal('modalProfiles'); };
                list.appendChild(div);
            });
        }

        window.abrirEdicionPerfil = () => { esEdicion = true; document.getElementById('chatNick').value = userChat.nick; abrirModal('chatRegister'); };
        window.abrirRegistroNuevo = () => { esEdicion = false; document.getElementById('chatNick').value=""; cerrarModal('modalProfiles'); abrirModal('chatRegister'); };

        window.finalizarRegistroChat = async () => {
            const n = document.getElementById('chatNick').value;
            const t = document.getElementById('chatPhone').value;
            const f = document.getElementById('chatImg').files[0];
            if(!n) return alert("Pon un nombre");
            let imgB64 = userChat.foto;
            if(f) imgB64 = await toBase64(f);
            if(esEdicion) {
                await updateDoc(doc(db, "miembros_chat", userChat.id), { nick: n, tel: t, foto: imgB64 });
            } else {
                const res = await addDoc(collection(db, "miembros_chat"), { nick: n, tel: t, foto: imgB64, online: true });
                userChat.id = res.id;
            }
            userChat.nick = n; userChat.foto = imgB64;
            localStorage.setItem('chatUserId', userChat.id);
            cerrarModal('chatRegister'); abrirChat(); setOnline(true);
        };

        function abrirChat() {
            document.getElementById('statusIndicator').innerHTML = `<span class="status-dot" style="background:#22c55e"></span> ${userChat.nick} (En Línea)`;
            abrirModal('modalChat');
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(50));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                sn.forEach(docS => {
                    const d = docS.data();
                    const esMio = d.emisorId === userChat.id;
                    const t = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
                    const container = document.createElement('div');
                    container.className = `msg-container ${esMio ? 'msg-a-container' : ''}`;
                    let content = `<div class="msg ${esMio ? 'msg-a' : 'msg-v'}" onclick="prepararRespuesta('${d.emisor}', '${d.msg}')">`;
                    content += `<b style="font-size:0.7rem; color:${getCol(d.emisor)}">${d.emisor}</b>`;
                    if(d.respA) content += `<div class="reply-box">↩️ ${d.respA}: ${d.respM}</div>`;
                    content += `<div>${d.msg}</div><div class="msg-info"><span class="msg-time">${t}</span></div></div>`;
                    container.innerHTML = `<img src="${d.foto || ''}" class="pfp-mini" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">${content}`;
                    box.appendChild(container);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.prepararRespuesta = (autor, msg) => { respuestaActiva = { autor, msg }; document.getElementById('replyText').innerText = `Respondiendo a ${autor}...`; document.getElementById('replyPreviewContainer').classList.remove('hidden'); };
        window.cancelarRespuesta = () => { respuestaActiva = null; document.getElementById('replyPreviewContainer').classList.add('hidden'); };

        window.enviarMensaje = async () => {
            const m = document.getElementById('msgInput').value; if(!m) return;
            await addDoc(collection(db, "chat"), { 
                emisor: userChat.nick, emisorId: userChat.id, foto: userChat.foto, msg: m, fecha: serverTimestamp(),
                respA: respuestaActiva ? respuestaActiva.autor : null, respM: respuestaActiva ? respuestaActiva.msg : null
            });
            document.getElementById('msgInput').value = ""; cancelarRespuesta();
        };

        // --- FUNCIONES ADMIN RESTAURADAS ---
        window.guardarUsuario = async () => {
            await addDoc(collection(db, "usuarios"), { nombre: document.getElementById('uN').value, correo: document.getElementById('uE').value, clave: document.getElementById('uP').value, rol: document.getElementById('uR').value });
            alert("Creado"); cargarVendedores();
        };
        window.cargarVendedores = async () => {
            const list = document.getElementById('listaU'); list.innerHTML = "";
            const s = await getDocs(collection(db, "usuarios"));
            s.forEach(d => { const u = d.data(); list.innerHTML += `<div style="background:#0f172a; padding:8px; margin-bottom:5px; border-radius:5px;">👤 ${u.nombre} (${u.rol})</div>`; });
        };
        window.guardarPlataforma = async () => {
            await addDoc(collection(db, "productos"), { nombre: document.getElementById('pN').value, precio: document.getElementById('pP').value });
            cargarPlataformas();
        };
        window.cargarPlataformas = async () => {
            const list = document.getElementById('listaP'); list.innerHTML = "";
            const s = await getDocs(collection(db, "productos"));
            s.forEach(d => { const p = d.data(); list.innerHTML += `<div style="background:#0f172a; padding:8px; margin-bottom:5px;">📺 ${p.nombre} - $${p.precio}</div>`; });
        };
        window.guardarCliente = async () => {
            await addDoc(collection(db, "clientes"), { nombre: document.getElementById('cN').value, whatsapp: document.getElementById('cW').value });
            cargarClientes();
        };
        window.cargarClientes = async () => {
            const list = document.getElementById('listaC'); list.innerHTML = "";
            const s = await getDocs(collection(db, "clientes"));
            s.forEach(d => { const c = d.data(); list.innerHTML += `<div style="background:#0f172a; padding:8px; margin-bottom:5px;">👤 ${c.nombre}</div>`; });
        };
        window.cargarTodosLosMiembros = async () => {
            const cont = document.getElementById('fullMembersList'); cont.innerHTML = "";
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach(m => {
                const d = m.data();
                cont.innerHTML += `<div style="background:#0f172a; padding:10px; border-left:4px solid #2563eb; margin-bottom:10px;">
                    <b>${d.nick}</b> <span style="color:${d.online?'#22c55e':'#ef4444'}">${d.online?'[Online]':'[Offline]'}</span>
                </div>`;
            });
        };
    </script>
</body>
</html>
