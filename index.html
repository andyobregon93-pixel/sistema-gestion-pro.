<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO - ANDY</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; font-size: 0.8rem; }
        
        /* Chat */
        #chatBox { background: #0f172a; height: 350px; overflow-y: auto; padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 10px; font-size: 0.85rem; max-width: 85%; position: relative; cursor: pointer; transition: 0.2s; }
        .msg:active { background: #475569; }
        .msg-v { background: #334155; align-self: flex-start; }
        .msg-a { background: var(--primary); align-self: flex-end; }
        .msg b { display: block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 4px; }
        
        .reply-box { background: rgba(0,0,0,0.3); border-left: 3px solid var(--success); padding: 5px; margin-bottom: 5px; font-size: 0.75rem; border-radius: 4px; pointer-events: none; }
        .reply-preview { background: #1e293b; padding: 8px; border-left: 4px solid var(--success); display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-radius: 4px; font-size: 0.8rem; }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 20px; }
        
        .list-item { background: #334155; padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; text-align: left; }
        .member-card { background: #0f172a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
            <div style="background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid var(--primary); width:100%; max-width:350px; text-align:center;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo">
                <input type="password" id="logPass" placeholder="Clave">
                <button class="btn-add" onclick="validarAcceso()">ENTRAR</button>
            </div>
        </div>
    </div>

    <!-- PANEL -->
    <div id="mainDashboard" class="hidden">
        <header><h3 id="userTitle">PANEL</h3></header>
        <div class="grid-menu">
            <div class="card" onclick="checkChatAccess()">💬 Chat del Grupo</div>
            <div id="menuAdminOnly" class="hidden" style="display: contents;">
                <div class="card" onclick="abrirModal('modalAdminMiembros', cargarTodosLosMiembros)" style="border-color: var(--success);">👥 Lista de Miembros</div>
                <div class="card" onclick="abrirModal('modalClientes', cargarClientes)">👥 Mis Clientes</div>
                <div class="card" onclick="abrirModal('modalPlataformas', cargarPlataformas)">📺 Plataformas</div>
                <div class="card" onclick="abrirModal('modalVendedores', cargarVendedores)" style="grid-column: span 2;">👷 Config. Usuarios</div>
            </div>
        </div>
        <button onclick="location.reload()" style="background:var(--danger); margin: 20px auto; display:block; width:80%">CERRAR SESIÓN</button>
    </div>

    <!-- MODALES -->
    <div id="modalAdminMiembros" class="modal"><div class="modal-content"><h3>Miembros</h3><div id="fullMembersList"></div><button class="btn-cerrar" onclick="cerrarModal('modalAdminMiembros')">VOLVER</button></div></div>
    <div id="modalAnotarPedido" class="modal"><div class="modal-content"><h3 id="pedidoTitle">Anotar</h3><textarea id="pedidoTexto" rows="4"></textarea><button class="btn-add" onclick="guardarPedidoFirebase()">GUARDAR</button></div></div>
    <div id="modalProfiles" class="modal"><div class="modal-content"><h3>¿Quién eres?</h3><div id="profilesList"></div><button class="btn-add" onclick="abrirRegistroNuevo()">+ REGISTRARME</button></div></div>
    <div id="chatRegister" class="modal"><div class="modal-content"><h3>Nuevo Registro</h3><input type="text" id="chatNick" placeholder="Nombre"><input type="text" id="chatPhone" placeholder="WhatsApp"><button class="btn-add" onclick="finalizarRegistroChat()">LISTO</button></div></div>

    <div id="modalChat" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h3 id="chatHeaderTitle">Chat</h3>
            <div id="chatBox"></div>
            <div id="replyPreviewContainer" class="hidden">
                <div class="reply-preview">
                    <div id="replyText"></div>
                    <button onclick="cancelarRespuesta()" style="width:30px; background:var(--danger)">X</button>
                </div>
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="msgInput" placeholder="Mensaje... (Toca otro para responder)">
                <button class="btn-add" style="width: 70px;" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-cerrar" onclick="cerrarModal('modalChat')">SALIR</button>
        </div>
    </div>

    <div id="modalVendedores" class="modal"><div class="modal-content"><h3>Usuarios</h3><input type="text" id="uN" placeholder="Nombre"><input type="email" id="uE" placeholder="Correo"><input type="text" id="uP" placeholder="Clave"><select id="uR"><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select><button class="btn-add" onclick="guardarUsuario()">CREAR</button><div id="listaU"></div><button class="btn-cerrar" onclick="cerrarModal('modalVendedores')">VOLVER</button></div></div>
    <div id="modalPlataformas" class="modal"><div class="modal-content"><h3>Plataformas</h3><input type="text" id="pN" placeholder="Nombre"><input type="number" id="pP" placeholder="Precio"><button class="btn-add" onclick="guardarPlataforma()">AÑADIR</button><div id="listaP"></div><button class="btn-cerrar" onclick="cerrarModal('modalPlataformas')">VOLVER</button></div></div>
    <div id="modalClientes" class="modal"><div class="modal-content"><h3>Clientes</h3><input type="text" id="cN" placeholder="Nombre"><input type="text" id="cW" placeholder="WhatsApp"><button class="btn-add" onclick="guardarCliente()">GUARDAR</button><div id="listaC"></div><button class="btn-cerrar" onclick="cerrarModal('modalClientes')">VOLVER</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, serverTimestamp, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userChat = { nick: localStorage.getItem('chatNick') || "", tel: localStorage.getItem('chatTel') || "" };
        let memberSeleccionadoId = "";
        let respuestaActiva = null;

        window.abrirModal = (id, cb) => { document.getElementById(id).style.display = "block"; if(cb) cb(); };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";

        // CHAT Y RESPUESTAS (Universal)
        window.checkChatAccess = () => { if(userChat.nick && userChat.tel) abrirChat(); else cargarListaPerfiles(); };
        
        async function cargarListaPerfiles() {
            const listDiv = document.getElementById('profilesList'); listDiv.innerHTML = ""; abrirModal('modalProfiles');
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div'); item.className = 'list-item';
                item.innerHTML = `<b>${data.nick}</b><br><small>${data.tel}</small>`;
                item.onclick = () => seleccionarPerfil(data.nick, data.tel);
                listDiv.appendChild(item);
            });
        }

        window.seleccionarPerfil = (nick, tel) => {
            userChat.nick = nick; userChat.tel = tel;
            localStorage.setItem('chatNick', nick); localStorage.setItem('chatTel', tel);
            cerrarModal('modalProfiles'); abrirChat();
        };

        window.finalizarRegistroChat = async () => {
            const n = document.getElementById('chatNick').value; const t = document.getElementById('chatPhone').value;
            await addDoc(collection(db, "miembros_chat"), { nick: n, tel: t, ultimoPedido: "" });
            seleccionarPerfil(n, t); cerrarModal('chatRegister');
        };

        function abrirChat() {
            document.getElementById('chatHeaderTitle').innerText = "Chat: " + userChat.nick;
            abrirModal('modalChat');
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(100));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const d = docSnap.data();
                    const estilo = (d.emisor === userChat.nick) ? 'msg-a' : 'msg-v';
                    const div = document.createElement('div');
                    div.className = `msg ${estilo}`;
                    
                    let contenido = `<b>${d.emisor}</b>`;
                    if(d.respuestaA) { contenido += `<div class="reply-box">↩️ ${d.respuestaA}: ${d.respuestaMsg}</div>`; }
                    contenido += d.msg;
                    
                    div.innerHTML = contenido;
                    div.onclick = () => { respuestaActiva = { autor: d.emisor, texto: d.msg }; document.getElementById('replyText').innerText = `Respondiendo a ${d.emisor}`; document.getElementById('replyPreviewContainer').classList.remove('hidden'); };
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.cancelarRespuesta = () => { respuestaActiva = null; document.getElementById('replyPreviewContainer').classList.add('hidden'); };

        window.enviarMensaje = async () => {
            const m = document.getElementById('msgInput').value;
            if(!m) return;
            await addDoc(collection(db, "chat"), { 
                emisor: userChat.nick, msg: m, fecha: serverTimestamp(),
                respuestaA: respuestaActiva ? respuestaActiva.autor : null,
                respuestaMsg: respuestaActiva ? respuestaActiva.texto : null
            });
            document.getElementById('msgInput').value = "";
            cancelarRespuesta();
        };

        // ADMIN FUNCTIONS (ADMIN ONLY)
        window.validarAcceso = async () => {
            const e = document.getElementById('logEmail').value; const p = document.getElementById('logPass').value;
            if(e === "Andyobregon799@gmail.com" && p === "123456") { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainDashboard').classList.remove('hidden'); document.getElementById('menuAdminOnly').classList.remove('hidden'); }
        };
        window.guardarUsuario = async () => { await addDoc(collection(db, "usuarios"), { nombre: document.getElementById('uN').value, correo: document.getElementById('uE').value, clave: document.getElementById('uP').value, rol: document.getElementById('uR').value }); alert("Guardado"); };
        window.guardarPlataforma = async () => { await addDoc(collection(db, "productos"), { nombre: document.getElementById('pN').value, precio: document.getElementById('pP').value }); alert("Guardado"); };
        window.guardarCliente = async () => { await addDoc(collection(db, "clientes"), { nombre: document.getElementById('cN').value, whatsapp: document.getElementById('cW').value }); alert("Guardado"); };
        window.cargarTodosLosMiembros = async () => {
            const container = document.getElementById('fullMembersList'); container.innerHTML = "";
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach(m => {
                const d = m.data();
                const div = document.createElement('div'); div.className = 'member-card';
                div.innerHTML = `<b>${d.nick}</b><br><small>Pedido: ${d.ultimoPedido || 'Ninguno'}</small><br><button onclick="memberSeleccionadoId='${m.id}'; abrirModal('modalAnotarPedido')">ANOTAR PEDIDO</button>`;
                container.appendChild(div);
            });
        };
        window.guardarPedidoFirebase = async () => { await updateDoc(doc(db, "miembros_chat", memberSeleccionadoId), { ultimoPedido: document.getElementById('pedidoTexto').value }); cerrarModal('modalAnotarPedido'); };
    </script>
</body>
</html>
