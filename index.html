<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO - ANDY</title>
    <style>
        :root { 
            --primary: #2563eb; --bg: #0b141a; --card-bg: #1e293b; 
            --text: #f8fafc; --danger: #ef4444; --success: #22c55e; 
            --wa-bg: #0b141a; --wa-msg-in: #202c33; --wa-msg-out: #005c4b; 
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; font-size: 0.8rem; }
        
        /* CHAT */
        #chatBox { 
            background: var(--wa-bg); height: 400px; overflow-y: auto; padding: 15px; 
            border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; 
            display: flex; flex-direction: column; 
            background-image: radial-gradient(#ffffff10 1px, transparent 1px); background-size: 20px 20px; 
        }
        .msg-container { display: flex; align-items: flex-end; margin-bottom: 8px; gap: 8px; width: 100%; }
        .msg-a-container { flex-direction: row-reverse; }
        .pfp-mini { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #334155; border: 1px solid var(--primary); }
        
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; max-width: 70%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); cursor: pointer; }
        .msg-v { background: var(--wa-msg-in); border-bottom-left-radius: 2px; }
        .msg-a { background: var(--wa-msg-out); border-bottom-right-radius: 2px; }
        
        .msg-info { display: flex; justify-content: flex-end; align-items: center; margin-top: 4px; }
        .msg-time { font-size: 0.65rem; color: #94a3b8; }
        .reply-box { background: rgba(0,0,0,0.2); border-left: 3px solid var(--success); padding: 5px; margin-bottom: 5px; font-size: 0.75rem; border-radius: 4px; color: #cbd5e1; }
        
        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 10px; }
        
        .btn-mic { background: #5f27cd; color: white; width: 50px; font-size: 1.2rem; }
        .recording { background: var(--danger) !important; animation: blink 1s infinite; }
        #recordTimer { color: var(--danger); font-weight: bold; font-size: 0.9rem; margin-right: 10px; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .member-item { border-bottom: 1px solid #334155; padding: 10px 0; }
    </style>
</head>
<body>

    <!-- ACCESO -->
    <div id="loginScreen">
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
            <div style="background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid var(--primary); width:100%; max-width:350px; text-align:center;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo">
                <input type="password" id="logPass" placeholder="Contraseña">
                <button class="btn-add" onclick="validarAcceso()">ENTRAR</button>
            </div>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="mainDashboard" class="hidden">
        <header><h3 id="welcomeUser">BIENVENIDO</h3></header>
        <div class="grid-menu">
            <div class="card" onclick="checkChatAccess()">💬 CHAT VIP</div>
            <div id="adminTools" class="hidden" style="display: contents;">
                <div class="card" onclick="abrirModal('modalAdminMiembros', cargarTodosLosMiembros)">👥 GESTIÓN MIEMBROS</div>
                <div class="card" onclick="abrirModal('modalVendedores', cargarVendedores)">⚙️ USUARIOS</div>
            </div>
        </div>
        <button onclick="location.reload()" style="background:var(--danger); width:80%; margin:20px auto; display:block;">CERRAR SESIÓN</button>
    </div>

    <!-- CHAT VIP -->
    <div id="modalChat" class="modal">
        <div class="modal-content" style="max-width: 600px; height: 95vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
                <div id="statusIndicator" style="font-size: 0.8rem;"></div>
                <button style="width:auto; font-size:0.7rem; background:#4f46e5; padding:5px 10px;" onclick="abrirEdicionPerfil()">⚙️ MI FOTO</button>
            </div>
            
            <div id="chatBox"></div>
            
            <div id="replyPreviewContainer" class="hidden" style="background:#1e293b; padding:10px; border-left:4px solid var(--success);">
                <div id="replyText" style="font-size:0.8rem;"></div>
                <button onclick="cancelarRespuesta()" style="background:var(--danger); height:20px; width:20px; padding:0; float:right;">X</button>
            </div>

            <div style="display: flex; gap: 5px; margin-top: 5px; align-items: center;">
                <span id="recordTimer" class="hidden">0:00</span>
                <input type="text" id="msgInput" placeholder="Escribe aquí...">
                <button id="btnVoice" class="btn-mic" onclick="toggleAudio()">🎤</button>
                <button class="btn-add" style="width: 60px;" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-cerrar" onclick="cerrarModal('modalChat')">SALIR AL PANEL</button>
        </div>
    </div>

    <!-- MODALES GESTIÓN -->
    <div id="modalProfiles" class="modal"><div class="modal-content"><h3>Elige tu Perfil</h3><div id="profilesList"></div><button class="btn-add" onclick="abrirRegistroNuevo()">+ REGISTRARSE NUEVO</button></div></div>
    
    <div id="chatRegister" class="modal">
        <div class="modal-content">
            <h3>Registro Nuevo</h3>
            <input type="text" id="chatNick" placeholder="Nombre Completo">
            <input type="number" id="chatPhone" placeholder="Número de Celular">
            <p style="font-size: 0.7rem;">Foto de Perfil:</p>
            <input type="file" id="chatImg" accept="image/*">
            <button class="btn-add" onclick="finalizarRegistroChat()">FINALIZAR REGISTRO</button>
            <button class="btn-cerrar" onclick="cerrarModal('chatRegister')">CANCELAR</button>
        </div>
    </div>

    <div id="modalVendedores" class="modal"><div class="modal-content"><h3>Usuarios del Sistema</h3><input type="text" id="uN" placeholder="Nombre"><input type="email" id="uE" placeholder="Correo"><input type="text" id="uP" placeholder="Clave"><button class="btn-add" onclick="guardarUsuario()">CREAR USUARIO</button><hr><div id="listaU"></div><button class="btn-cerrar" onclick="cerrarModal('modalVendedores')">X</button></div></div>
    
    <div id="modalAdminMiembros" class="modal">
        <div class="modal-content">
            <h3>Lista de Miembros</h3>
            <div id="fullMembersList"></div>
            <button class="btn-cerrar" onclick="cerrarModal('modalAdminMiembros')">CERRAR</button>
        </div>
    </div>

    <!-- MODAL ANOTAR PEDIDO -->
    <div id="modalPedido" class="modal">
        <div class="modal-content">
            <h3 id="pedidoTitle">Anotar Pedido</h3>
            <textarea id="pedidoTexto" placeholder="Ej: Pidió cuenta Netflix 1 mes..."></textarea>
            <button class="btn-add" id="btnGuardarPedido">GUARDAR ANOTACIÓN</button>
            <button class="btn-cerrar" onclick="cerrarModal('modalPedido')">X</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        let userChat = { id: localStorage.getItem('chatUserId') || "", nick: localStorage.getItem('chatNick') || "", foto: localStorage.getItem('chatFoto') || "" };
        let respuestaActiva = null;
        let mediaRecorder, chunks = [], timerInterval, seconds = 0;

        const getCol = (str) => ['#ff9f43', '#ee5253', '#10ac84', '#5f27cd', '#0abde3'][str.length % 5];
        window.abrirModal = (id, cb) => { document.getElementById(id).style.display = "block"; if(cb) cb(); };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";
        async function toBase64(file) { return new Promise((r) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => r(reader.result); }); }

        window.validarAcceso = async () => {
            const c = document.getElementById('logEmail').value, p = document.getElementById('logPass').value;
            if(c === "Andyobregon799@gmail.com" && p === "123456") { mostrarDashboard("ADMIN", true); return; }
            const s = await getDocs(collection(db, "usuarios"));
            let enc = false;
            s.forEach(d => { if(d.data().correo === c && d.data().clave === p) { mostrarDashboard(d.data().nombre, d.data().rol === "admin"); enc = true; } });
            if(!enc) alert("Datos incorrectos");
        };

        function mostrarDashboard(n, a) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = "HOLA, " + n;
            if(a) document.getElementById('adminTools').classList.remove('hidden');
        }

        window.checkChatAccess = () => { if(userChat.id) abrirChat(); else cargarListaPerfiles(); };

        async function cargarListaPerfiles() {
            const list = document.getElementById('profilesList'); list.innerHTML = "Cargando..."; abrirModal('modalProfiles');
            const s = await getDocs(collection(db, "miembros_chat"));
            list.innerHTML = "";
            s.forEach(d => {
                const div = document.createElement('div'); div.className = "card"; div.style.marginBottom="5px";
                div.innerHTML = `<b>${d.data().nick}</b><br><small>${d.data().celular || ''}</small>`;
                div.onclick = () => { 
                    userChat = { id: d.id, nick: d.data().nick, foto: d.data().foto || "" }; 
                    localStorage.setItem('chatUserId', d.id); 
                    localStorage.setItem('chatNick', d.data().nick);
                    localStorage.setItem('chatFoto', d.data().foto || "");
                    abrirChat(); cerrarModal('modalProfiles'); 
                };
                list.appendChild(div);
            });
        }

        window.abrirRegistroNuevo = () => { cerrarModal('modalProfiles'); abrirModal('chatRegister'); };

        window.finalizarRegistroChat = async () => {
            const nick = document.getElementById('chatNick').value;
            const cel = document.getElementById('chatPhone').value;
            const file = document.getElementById('chatImg').files[0];
            if(!nick || !cel) return alert("Nombre y celular obligatorios");
            let imgB64 = "";
            if(file) imgB64 = await toBase64(file);
            const docRef = await addDoc(collection(db, "miembros_chat"), { nick: nick, celular: cel, foto: imgB64, pedido: "" });
            userChat = { id: docRef.id, nick: nick, foto: imgB64 };
            localStorage.setItem('chatUserId', docRef.id);
            localStorage.setItem('chatNick', nick);
            localStorage.setItem('chatFoto', imgB64);
            cerrarModal('chatRegister'); abrirChat();
        };

        function abrirChat() {
            document.getElementById('statusIndicator').innerText = `● ${userChat.nick} (Online)`;
            abrirModal('modalChat');
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(70));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                sn.forEach(docS => {
                    const d = docS.data();
                    const esMio = d.emisorId === userChat.id;
                    const h = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...';
                    const container = document.createElement('div');
                    container.className = `msg-container ${esMio ? 'msg-a-container' : ''}`;
                    let content = `<div class="msg ${esMio ? 'msg-a' : 'msg-v'}" onclick="prepararRespuesta('${d.emisor}', '${d.msg || 'Audio'}')">`;
                    content += `<b style="font-size:0.7rem; color:${getCol(d.emisor)}">${d.emisor}</b>`;
                    if(d.respA) content += `<div class="reply-box">↩️ ${d.respA}: ${d.respM}</div>`;
                    content += d.audio ? `<audio controls src="${d.audio}" style="width:180px; height:35px;"></audio>` : `<div>${d.msg}</div>`;
                    content += `<div class="msg-info"><span class="msg-time">${h}</span></div></div>`;
                    container.innerHTML = `<img src="${d.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="pfp-mini">${content}`;
                    box.appendChild(container);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.enviarMensaje = async () => {
            const input = document.getElementById('msgInput');
            const m = input.value.trim(); 
            if(!m) return;
            const tempMsg = m; 
            input.value = "";
            
            // Construimos el objeto del mensaje. Solo agregamos respuestas si existen.
            const mensajeData = {
                emisor: userChat.nick,
                emisorId: userChat.id,
                foto: userChat.foto || "",
                msg: tempMsg,
                fecha: serverTimestamp()
            };

            if(respuestaActiva && respuestaActiva.autor && respuestaActiva.msg) {
                mensajeData.respA = respuestaActiva.autor;
                mensajeData.respM = respuestaActiva.msg;
            }

            try {
                await addDoc(collection(db, "chat"), mensajeData);
                cancelarRespuesta();
            } catch(e) {
                console.error("Error al enviar:", e);
                alert("No se pudo enviar el mensaje. Intenta de nuevo.");
            }
        };

        window.toggleAudio = async () => {
            const btn = document.getElementById('btnVoice'), timer = document.getElementById('recordTimer');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); chunks = []; seconds = 0;
                    timer.classList.remove('hidden');
                    timerInterval = setInterval(() => { seconds++; timer.innerText = `0:${seconds < 10 ? '0' : ''}${seconds}`; }, 1000);
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        clearInterval(timerInterval); timer.classList.add('hidden');
                        const b64 = await toBase64(new Blob(chunks, { type: 'audio/mp3' }));
                        await addDoc(collection(db, "chat"), { emisor: userChat.nick, emisorId: userChat.id, foto: userChat.foto || "", audio: b64, fecha: serverTimestamp() });
                    };
                    mediaRecorder.start(); btn.classList.add('recording');
                } catch(e) { alert("Error al acceder al micro"); }
            } else { mediaRecorder.stop(); btn.classList.remove('recording'); }
        };

        window.prepararRespuesta = (a, m) => { respuestaActiva = { autor: a, msg: m }; document.getElementById('replyText').innerText = `Respondiendo a ${a}`; document.getElementById('replyPreviewContainer').classList.remove('hidden'); };
        window.cancelarRespuesta = () => { respuestaActiva = null; document.getElementById('replyPreviewContainer').classList.add('hidden'); };

        window.cargarTodosLosMiembros = async () => {
            const cont = document.getElementById('fullMembersList'); cont.innerHTML = "Cargando...";
            const s = await getDocs(collection(db, "miembros_chat"));
            cont.innerHTML = "";
            s.forEach(m => {
                const data = m.data();
                const div = document.createElement('div');
                div.className = "member-item";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b>${data.nick}</b><br>
                            <small>${data.celular || 'Sin número'}</small><br>
                            <span style="color:var(--success); font-size:0.7rem;">Nota: ${data.pedido || 'Ninguna'}</span>
                        </div>
                        <button style="width:auto; padding:5px; background:var(--primary); font-size:0.7rem;" onclick="abrirAnotarPedido('${m.id}', '${data.nick}', '${data.pedido || ''}')">ANOTAR</button>
                    </div>
                `;
                cont.appendChild(div);
            });
        };

        window.abrirAnotarPedido = (id, nick, actual) => {
            abrirModal('modalPedido');
            document.getElementById('pedidoTitle').innerText = "Pedido de " + nick;
            document.getElementById('pedidoTexto').value = actual;
            document.getElementById('btnGuardarPedido').onclick = async () => {
                const texto = document.getElementById('pedidoTexto').value;
                await updateDoc(doc(db, "miembros_chat", id), { pedido: texto });
                cerrarModal('modalPedido');
                cargarTodosLosMiembros();
            };
        };

        window.guardarUsuario = async () => { await addDoc(collection(db, "usuarios"), { nombre: document.getElementById('uN').value, correo: document.getElementById('uE').value, clave: document.getElementById('uP').value, rol: "vendedor" }); cargarVendedores(); };
        window.cargarVendedores = async () => { const l = document.getElementById('listaU'); l.innerHTML = ""; const s = await getDocs(collection(db, "usuarios")); s.forEach(d => l.innerHTML += `<div style="padding:5px;">👤 ${d.data().nombre} (${d.data().rol})</div>`); };
    </script>
</body>
</html>
