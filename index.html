<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO - ANDY</title>
    <style>
        :root { --primary: #2563eb; --bg: #0b141a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; --wa-bg: #0b141a; --wa-msg-in: #202c33; --wa-msg-out: #005c4b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; font-size: 0.8rem; }
        
        /* CHAT WHATSAPP STYLE */
        #chatBox { background: var(--wa-bg); height: 400px; overflow-y: auto; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; display: flex; flex-direction: column; }
        .msg-container { display: flex; align-items: flex-end; margin-bottom: 8px; gap: 8px; width: 100%; }
        .msg-a-container { flex-direction: row-reverse; }
        .pfp-mini { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #334155; border: 1px solid var(--primary); }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; max-width: 70%; position: relative; }
        .msg-v { background: var(--wa-msg-in); }
        .msg-a { background: var(--wa-msg-out); }
        .msg-time { font-size: 0.65rem; color: #94a3b8; text-align: right; display: block; margin-top: 4px; }

        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- ACCESO ADMIN -->
    <div id="loginScreen">
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
            <div style="background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid var(--primary); width:100%; max-width:350px; text-align:center;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo Admin">
                <input type="password" id="logPass" placeholder="Clave Admin">
                <button class="btn-add" onclick="validarAcceso()">ENTRAR AL PANEL</button>
                <hr style="margin:20px 0; opacity:0.3">
                <button style="background:#05a884" onclick="checkChatAccess()">ENTRAR SOLO AL CHAT</button>
            </div>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="mainDashboard" class="hidden">
        <header><h3>PANEL ADMINISTRATIVO</h3></header>
        <div class="grid-menu">
            <div class="card" onclick="checkChatAccess()">💬 Chat VIP</div>
            <div class="card" onclick="abrirModal('modalAdminMiembros', cargarTodosLosMiembros)">👥 Gestionar Miembros</div>
            <div class="card" onclick="abrirModal('modalClientes', cargarClientes)">👥 Mis Clientes</div>
            <div class="card" onclick="abrirModal('modalPlataformas', cargarPlataformas)">📺 Plataformas</div>
            <div class="card" onclick="abrirModal('modalVendedores', cargarVendedores)" style="grid-column: span 2;">⚙️ Crear Usuarios/Vendedores</div>
        </div>
        <button onclick="location.reload()" style="background:var(--danger); width:80%; margin:20px auto; display:block;">CERRAR SESIÓN</button>
    </div>

    <!-- MODAL SELECCIÓN DE PERFIL / REGISTRO -->
    <div id="modalProfiles" class="modal">
        <div class="modal-content">
            <h3>Selecciona tu Perfil</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Si ya te registraste antes, búscate en la lista:</p>
            <div id="profilesList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn-add" onclick="abrirRegistroNuevo()">NO ESTOY EN LA LISTA (REGISTRARME)</button>
            <button class="btn-cerrar" onclick="cerrarModal('modalProfiles')">VOLVER</button>
        </div>
    </div>

    <!-- FORMULARIO REGISTRO/EDICIÓN -->
    <div id="chatRegister" class="modal">
        <div class="modal-content">
            <h3 id="regTitle">Mis Datos</h3>
            <input type="text" id="chatNick" placeholder="Nombre/Apodo">
            <input type="text" id="chatPhone" placeholder="Número de Móvil">
            <p style="font-size: 0.7rem;">Foto (Opcional):</p>
            <input type="file" id="chatImg" accept="image/*">
            <button class="btn-add" id="btnRegChat" onclick="finalizarRegistroChat()">GUARDAR Y ENTRAR</button>
            <button class="btn-cerrar" onclick="cerrarModal('chatRegister')">CANCELAR</button>
        </div>
    </div>

    <!-- CHAT VIP -->
    <div id="modalChat" class="modal">
        <div class="modal-content" style="max-width: 600px; height: 90vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px;">
                <div id="statusIndicator" style="font-size: 0.8rem;"></div>
                <button style="width:auto; font-size:0.7rem; background:#4f46e5; padding:5px 10px;" onclick="abrirEdicionPerfil()">⚙️ EDITAR MI FOTO</button>
            </div>
            <div id="chatBox"></div>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="text" id="msgInput" placeholder="Escribe aquí...">
                <button class="btn-add" style="width: 60px;" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-cerrar" onclick="cerrarModal('modalChat')">SALIR</button>
        </div>
    </div>

    <!-- GESTIÓN ADMIN (USUARIOS, VENTAS, ETC) -->
    <div id="modalVendedores" class="modal"><div class="modal-content"><h3>Usuarios del Sistema</h3><input type="text" id="uN" placeholder="Nombre"><input type="email" id="uE" placeholder="Correo"><input type="text" id="uP" placeholder="Clave"><select id="uR"><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select><button class="btn-add" onclick="guardarUsuario()">CREAR</button><div id="listaU"></div><button class="btn-cerrar" onclick="cerrarModal('modalVendedores')">VOLVER</button></div></div>
    <div id="modalPlataformas" class="modal"><div class="modal-content"><h3>Plataformas</h3><input type="text" id="pN" placeholder="Nombre"><input type="number" id="pP" placeholder="Precio"><button class="btn-add" onclick="guardarPlataforma()">AÑADIR</button><div id="listaP"></div><button class="btn-cerrar" onclick="cerrarModal('modalPlataformas')">VOLVER</button></div></div>
    <div id="modalClientes" class="modal"><div class="modal-content"><h3>Clientes</h3><input type="text" id="cN" placeholder="Nombre"><input type="text" id="cW" placeholder="WhatsApp"><button class="btn-add" onclick="guardarCliente()">GUARDAR</button><div id="listaC"></div><button class="btn-cerrar" onclick="cerrarModal('modalClientes')">VOLVER</button></div></div>
    <div id="modalAdminMiembros" class="modal"><div class="modal-content"><h3>Control Miembros Chat</h3><div id="fullMembersList"></div><button class="btn-cerrar" onclick="cerrarModal('modalAdminMiembros')">CERRAR</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // PERSISTENCIA: Reconocimiento automático
        let userChat = { 
            id: localStorage.getItem('chatUserId') || "", 
            nick: localStorage.getItem('chatNick') || "", 
            foto: localStorage.getItem('chatFoto') || "" 
        };
        let esEdicion = false;

        window.abrirModal = (id, cb) => { document.getElementById(id).style.display = "block"; if(cb) cb(); };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";

        async function toBase64(file) {
            return new Promise((r, j) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => r(reader.result); reader.onerror = e => j(e); });
        }

        // --- LÓGICA DE ACCESO AL CHAT ---
        window.checkChatAccess = () => {
            if(userChat.id) { 
                abrirChat(); // Entra directamente si ya está registrado
            } else {
                cargarListaPerfiles(); // Muestra registrados si no hay datos en el móvil
            }
        };

        async function cargarListaPerfiles() {
            const list = document.getElementById('profilesList'); list.innerHTML = "Cargando miembros..."; 
            abrirModal('modalProfiles');
            const s = await getDocs(collection(db, "miembros_chat"));
            list.innerHTML = "";
            s.forEach(dSnap => {
                const d = dSnap.data();
                const div = document.createElement('div');
                div.style = "background:#202c33; padding:10px; margin:5px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px;";
                div.innerHTML = `<img src="${d.foto || ''}" class="pfp-mini" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"> <div><b>${d.nick}</b><br><small>${d.tel}</small></div>`;
                div.onclick = () => {
                    userChat = { id: dSnap.id, nick: d.nick, foto: d.foto };
                    localStorage.setItem('chatUserId', dSnap.id);
                    localStorage.setItem('chatNick', d.nick);
                    localStorage.setItem('chatFoto', d.foto || "");
                    cerrarModal('modalProfiles'); abrirChat();
                };
                list.appendChild(div);
            });
        }

        window.abrirRegistroNuevo = () => { esEdicion = false; document.getElementById('regTitle').innerText="Nuevo Registro"; cerrarModal('modalProfiles'); abrirModal('chatRegister'); };
        window.abrirEdicionPerfil = () => { esEdicion = true; document.getElementById('regTitle').innerText="Actualizar Perfil"; abrirModal('chatRegister'); };

        window.finalizarRegistroChat = async () => {
            const n = document.getElementById('chatNick').value;
            const t = document.getElementById('chatPhone').value;
            const f = document.getElementById('chatImg').files[0];
            if(!n || !t) return alert("Nombre y Móvil son obligatorios");
            
            let imgB64 = userChat.foto;
            if(f) imgB64 = await toBase64(f);

            if(esEdicion) {
                await updateDoc(doc(db, "miembros_chat", userChat.id), { nick: n, tel: t, foto: imgB64 });
                userChat.nick = n; userChat.foto = imgB64;
            } else {
                const res = await addDoc(collection(db, "miembros_chat"), { nick: n, tel: t, foto: imgB64, online: true, fechaRegistro: serverTimestamp() });
                userChat = { id: res.id, nick: n, foto: imgB64 };
            }
            
            localStorage.setItem('chatUserId', userChat.id);
            localStorage.setItem('chatNick', userChat.nick);
            localStorage.setItem('chatFoto', userChat.foto || "");
            cerrarModal('chatRegister'); abrirChat();
        };

        function abrirChat() {
            document.getElementById('statusIndicator').innerHTML = `<b style="color:#22c55e">● En Línea:</b> ${userChat.nick}`;
            abrirModal('modalChat');
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(50));
            onSnapshot(q, (sn) => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                sn.forEach(docS => {
                    const d = docS.data();
                    const esMio = d.emisorId === userChat.id;
                    const time = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    const container = document.createElement('div');
                    container.className = `msg-container ${esMio ? 'msg-a-container' : ''}`;
                    container.innerHTML = `
                        <img src="${d.foto || ''}" class="pfp-mini" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        <div class="msg ${esMio ? 'msg-a' : 'msg-v'}">
                            <b style="font-size:0.7rem; color:#8696a0">${d.emisor}</b>
                            <div>${d.msg}</div>
                            <span class="msg-time">${time}</span>
                        </div>`;
                    box.appendChild(container);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.enviarMensaje = async () => {
            const m = document.getElementById('msgInput').value; if(!m) return;
            await addDoc(collection(db, "chat"), { 
                emisor: userChat.nick, emisorId: userChat.id, foto: userChat.foto, msg: m, fecha: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        };

        // --- FUNCIONES ADMIN (RESTAURADAS COMPLETAS) ---
        window.validarAcceso = () => { 
            if(document.getElementById('logEmail').value === "Andyobregon799@gmail.com" && document.getElementById('logPass').value === "123456") { 
                document.getElementById('loginScreen').classList.add('hidden'); 
                document.getElementById('mainDashboard').classList.remove('hidden'); 
            } else { alert("Credenciales de Admin Incorrectas"); }
        };

        window.guardarUsuario = async () => {
            const n = document.getElementById('uN').value; const e = document.getElementById('uE').value;
            const p = document.getElementById('uP').value; const r = document.getElementById('uR').value;
            await addDoc(collection(db, "usuarios"), { nombre: n, correo: e, clave: p, rol: r });
            alert("Usuario administrativo creado"); cargarVendedores();
        };

        window.cargarVendedores = async () => {
            const list = document.getElementById('listaU'); list.innerHTML = "";
            const s = await getDocs(collection(db, "usuarios"));
            s.forEach(d => { const u = d.data(); list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #334155">👤 ${u.nombre} - ${u.rol}</div>`; });
        };

        window.guardarPlataforma = async () => {
            await addDoc(collection(db, "productos"), { nombre: document.getElementById('pN').value, precio: document.getElementById('pP').value });
            cargarPlataformas();
        };

        window.cargarPlataformas = async () => {
            const list = document.getElementById('listaP'); list.innerHTML = "";
            const s = await getDocs(collection(db, "productos"));
            s.forEach(d => { const p = d.data(); list.innerHTML += `<div style="padding:5px">📺 ${p.nombre} - $${p.precio}</div>`; });
        };

        window.guardarCliente = async () => {
            await addDoc(collection(db, "clientes"), { nombre: document.getElementById('cN').value, whatsapp: document.getElementById('cW').value });
            cargarClientes();
        };

        window.cargarClientes = async () => {
            const list = document.getElementById('listaC'); list.innerHTML = "";
            const s = await getDocs(collection(db, "clientes"));
            s.forEach(d => { const c = d.data(); list.innerHTML += `<div style="padding:5px">👤 ${c.nombre} - ${c.whatsapp}</div>`; });
        };

        window.cargarTodosLosMiembros = async () => {
            const cont = document.getElementById('fullMembersList'); cont.innerHTML = "";
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach(m => {
                const d = m.data();
                const card = document.createElement('div'); card.style = "background:#0f172a; padding:10px; margin:10px 0; border-radius:10px; border-left:4px solid #2563eb";
                card.innerHTML = `<b>${d.nick}</b><br><small>Tel: ${d.tel}</small><br><small>Pedido: ${d.ultimoPedido || 'Sin pedido'}</small>`;
                cont.appendChild(card);
            });
        };
    </script>
</body>
</html>
