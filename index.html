<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        /* Diseño de cuadrícula para móvil */
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { 
            background: var(--card-bg); 
            padding: 25px 10px; 
            text-align: center; 
            border-radius: 12px; 
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:active { transform: scale(0.95); background: var(--primary); }
        .deudores { border: 1px solid var(--danger); color: var(--danger); }
        .admin-section { grid-column: span 2; margin-top: 10px; background: #334155; }
        .status-bar { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }

        /* Estilos del Modal de Ventas */
        #modalVentas {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
            border: 1px solid var(--primary);
        }
        .btn-cerrar { background: var(--danger); color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 15px; }
        .producto-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
        .stock-tag { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="status-bar">Panel de Control General</div>
        <h2>SISTEMA GESTIÓN PRO</h2>
        <small>Bienvenido: <b>Andy</b></small>
    </header>

    <div class="grid-menu">
        <!-- Ahora este botón abre el modal y carga datos de Firebase -->
        <div class="card" id="btnRegistrarVenta">📦 Registrar Venta</div>
        <div class="card" onclick="alert('Lista Clientes (Próximamente)')">👥 Clientes</div>
        <div class="card deudores" onclick="alert('Lista Deudores (Próximamente)')">⚠️ Deudores</div>
        <div class="card" onclick="alert('Mis Ganancias (Próximamente)')">💰 Mis Ganancias</div>
        <div class="card admin-section" onclick="alert('Panel Admin (Próximamente)')">
            ⚙️ ADMINISTRAR TRABAJADORES Y ROLES
        </div>
    </div>

    <!-- Modal para mostrar productos de Firebase -->
    <div id="modalVentas">
        <div class="modal-content">
            <h3>Seleccionar Producto</h3>
            <div id="listaProductos">Cargando inventario...</div>
            <button class="btn-cerrar" id="btnCerrarModal">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tus credenciales configuradas
        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencias a elementos del DOM
        const modal = document.getElementById('modalVentas');
        const listaDiv = document.getElementById('listaProductos');
        const btnVenta = document.getElementById('btnRegistrarVenta');
        const btnCerrar = document.getElementById('btnCerrarModal');

        // Función para leer productos de la colección que creaste en 1000972212.png
        async function cargarInventario() {
            listaDiv.innerHTML = "Cargando...";
            try {
                const querySnapshot = await getDocs(collection(db, "productos"));
                listaDiv.innerHTML = ""; // Limpiar mensaje de carga
                
                if (querySnapshot.empty) {
                    listaDiv.innerHTML = "No hay productos en la base de datos.";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'producto-item';
                    item.innerHTML = `
                        <span>${data.nombre}</span>
                        <span class="stock-tag">${data.stock} disp.</span>
                        <span>$${data.precio}</span>
                    `;
                    // Aquí podrías agregar un onclick para procesar la venta
                    listaDiv.appendChild(item);
                });
            } catch (error) {
                console.error("Error al obtener productos:", error);
                listaDiv.innerHTML = "Error al conectar con Firebase.";
            }
        }

        // Eventos para abrir y cerrar el modal
        btnVenta.onclick = () => {
            modal.style.display = "block";
            cargarInventario();
        };

        btnCerrar.onclick = () => {
            modal.style.display = "none";
        };

        console.log("Sistema de Andy listo y conectado a la colección 'productos'");
    </script>
</body>
</html>
