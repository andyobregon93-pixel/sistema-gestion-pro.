<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { 
            background: var(--card-bg); padding: 25px 10px; text-align: center; border-radius: 12px; font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); border: 1px solid #334155; cursor: pointer; transition: 0.2s;
        }
        .card:active { transform: scale(0.95); background: var(--primary); }
        .admin-section { grid-column: span 2; margin-top: 10px; background: #334155; border: 1px solid var(--primary); }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--success); color: white; }
        .btn-cerrar { background: var(--danger); color: white; }
        
        .producto-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #334155; align-items: center; }
        .stock-tag { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2>SISTEMA GESTIÓN PRO</h2>
        <small>Panel de Control para <b>Andy Obregón</b></small>
    </header>

    <div class="grid-menu">
        <div class="card" onclick="abrirModal('modalVentas', cargarInventario)">📦 Registrar Venta</div>
        <div class="card" onclick="alert('Próximamente')">👥 Clientes</div>
        <div class="card" onclick="alert('Próximamente')">⚠️ Deudores</div>
        <div class="card" onclick="alert('Próximamente')">💰 Ganancias</div>
        <div class="card admin-section" onclick="abrirModal('modalAdmin')">⚙️ PANEL DE ADMINISTRACIÓN</div>
    </div>

    <!-- MODAL VENTAS (Ver productos) -->
    <div id="modalVentas" class="modal">
        <div class="modal-content">
            <h3>Seleccionar Producto</h3>
            <div id="listaProductos">Cargando...</div>
            <button class="btn-cerrar" onclick="cerrarModal('modalVentas')">Cerrar</button>
        </div>
    </div>

    <!-- MODAL ADMIN (Crear cosas) -->
    <div id="modalAdmin" class="modal">
        <div class="modal-content">
            <h3>Panel de Administración</h3>
            <p>Agregar Nuevo Producto al Inventario:</p>
            <input type="text" id="pNombre" placeholder="Nombre del Producto (ej: Netflix)">
            <input type="number" id="pPrecio" placeholder="Precio ($)">
            <input type="number" id="pStock" placeholder="Stock Inicial">
            <button class="btn-add" id="btnGuardarProducto">🚀 Guardar en Firebase</button>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <button class="btn-cerrar" onclick="cerrarModal('modalAdmin')">Cerrar Panel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Funciones de la interfaz
        window.abrirModal = (id, callback) => {
            document.getElementById(id).style.display = "block";
            if(callback) callback();
        };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";

        // CARGAR PRODUCTOS (Corregido para evitar el 'undefined' de la imagen 1000972244.png)
        async function cargarInventario() {
            const listaDiv = document.getElementById('listaProductos');
            listaDiv.innerHTML = "Cargando...";
            try {
                const querySnapshot = await getDocs(collection(db, "productos"));
                listaDiv.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    // Usamos nombres de campos genéricos para asegurar que lea lo que hay
                    const item = document.createElement('div');
                    item.className = 'producto-item';
                    item.innerHTML = `
                        <span><b>${d.nombre || d.Name || 'Sin nombre'}</b></span>
                        <span class="stock-tag">${d.stock || d.Stock || 0} disp.</span>
                        <span>$${d.precio || d.Price || 0}</span>
                    `;
                    listaDiv.appendChild(item);
                });
            } catch (e) { listaDiv.innerHTML = "Error al cargar."; }
        }

        // GUARDAR PRODUCTO DIRECTO DESDE LA WEB
        document.getElementById('btnGuardarProducto').onclick = async () => {
            const nombre = document.getElementById('pNombre').value;
            const precio = document.getElementById('pPrecio').value;
            const stock = document.getElementById('pStock').value;

            if(!nombre || !precio || !stock) return alert("Llena todos los campos");

            try {
                await addDoc(collection(db, "productos"), {
                    nombre: nombre,
                    precio: parseFloat(precio),
                    stock: parseInt(stock),
                    fecha: new Date()
                });
                alert("✅ Producto guardado correctamente");
                document.getElementById('pNombre').value = "";
                document.getElementById('pPrecio').value = "";
                document.getElementById('pStock').value = "";
            } catch (e) { alert("Error al guardar."); }
        };
    </script>
</body>
</html>
