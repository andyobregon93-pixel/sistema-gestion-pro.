<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA GESTIÓN PRO - ANDY</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        header { text-align: center; padding: 15px; border-bottom: 1px solid #334155; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px 5px; text-align: center; border-radius: 12px; font-weight: bold; border: 1px solid #334155; cursor: pointer; font-size: 0.8rem; }
        
        #chatBox { background: #0f172a; height: 400px; overflow-y: auto; padding: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 10px; font-size: 0.85rem; max-width: 85%; }
        .msg-v { background: #334155; align-self: flex-start; }
        .msg-a { background: var(--primary); align-self: flex-end; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid var(--primary); }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cerrar { background: var(--danger); color: white; margin-top: 20px; }
        
        .list-item { background: #334155; padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; text-align: left; border: 1px solid transparent; }
        .list-item:hover { border-color: var(--primary); }
        .member-card { background: #0f172a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
            <div style="background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid var(--primary); width:100%; max-width:350px; text-align:center;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo">
                <input type="password" id="logPass" placeholder="Clave">
                <button class="btn-add" onclick="validarAcceso()">ENTRAR</button>
            </div>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="mainDashboard" class="hidden">
        <header><h3 id="userTitle">PANEL</h3></header>
        <div class="grid-menu">
            <div class="card" onclick="checkChatAccess()">💬 Chat del Grupo</div>
            <div id="menuAdminOnly" class="hidden" style="display: contents;">
                <div class="card" onclick="abrirModal('modalAdminMiembros', cargarTodosLosMiembros)" style="border-color: var(--success);">👥 Lista de Miembros</div>
                <div class="card" onclick="abrirModal('modalClientes', cargarClientes)">👥 Mis Clientes</div>
                <div class="card" onclick="abrirModal('modalPlataformas', cargarPlataformas)">📺 Plataformas</div>
                <div class="card" onclick="abrirModal('modalVendedores', cargarVendedores)" style="grid-column: span 2;">👷 Config. Usuarios</div>
            </div>
        </div>
        <button onclick="location.reload()" style="background:var(--danger); margin: 20px auto; display:block; width:80%">CERRAR SESIÓN</button>
    </div>

    <!-- LISTADO ADMIN DE MIEMBROS -->
    <div id="modalAdminMiembros" class="modal">
        <div class="modal-content">
            <h3>Miembros Registrados</h3>
            <div id="fullMembersList" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn-cerrar" onclick="cerrarModal('modalAdminMiembros')">VOLVER</button>
        </div>
    </div>

    <!-- ANOTAR PEDIDO (SOLO ADMIN) -->
    <div id="modalAnotarPedido" class="modal">
        <div class="modal-content">
            <h3 id="pedidoTitle">Anotar Pedido</h3>
            <textarea id="pedidoTexto" rows="4" placeholder="Escribe lo que te pidió este usuario..."></textarea>
            <button class="btn-add" onclick="guardarPedidoFirebase()">GUARDAR PEDIDO</button>
            <button class="btn-cerrar" onclick="cerrarModal('modalAnotarPedido')">CANCELAR</button>
        </div>
    </div>

    <!-- SELECCIÓN PERFIL CHAT (MIEMBROS) -->
    <div id="modalProfiles" class="modal">
        <div class="modal-content">
            <h3>¿Quién eres?</h3>
            <div id="profilesList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn-add" style="background: var(--success);" onclick="abrirRegistroNuevo()">+ REGISTRARME</button>
            <button class="btn-cerrar" onclick="cerrarModal('modalProfiles')">VOLVER</button>
        </div>
    </div>

    <!-- REGISTRO CHAT -->
    <div id="chatRegister" class="modal">
        <div class="modal-content">
            <h3>Nuevo Registro</h3>
            <input type="text" id="chatNick" placeholder="Nombre">
            <input type="text" id="chatPhone" placeholder="WhatsApp">
            <button class="btn-add" onclick="finalizarRegistroChat()">LISTO</button>
            <button class="btn-cerrar" onclick="cerrarModal('chatRegister')">VOLVER</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="modalChat" class="modal">
        <div class="modal-content">
            <h3 id="chatHeaderTitle">Chat</h3>
            <div id="chatBox"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="msgInput" placeholder="Mensaje...">
                <button class="btn-add" style="width: 70px;" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-cerrar" onclick="cerrarModal('modalChat')">SALIR</button>
        </div>
    </div>

    <!-- OTROS MODALES ADMIN -->
    <div id="modalVendedores" class="modal"><div class="modal-content"><h3>Roles</h3><input type="text" id="uN" placeholder="Nombre"><input type="email" id="uE" placeholder="Correo"><input type="text" id="uP" placeholder="Clave"><select id="uR"><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select><button class="btn-add" onclick="guardarUsuario()">CREAR</button><div id="listaU"></div><button class="btn-cerrar" onclick="cerrarModal('modalVendedores')">VOLVER</button></div></div>
    <div id="modalPlataformas" class="modal"><div class="modal-content"><h3>Plataformas</h3><input type="text" id="pN" placeholder="Nombre"><input type="number" id="pP" placeholder="Precio"><button class="btn-add" onclick="guardarPlataforma()">AÑADIR</button><div id="listaP"></div><button class="btn-cerrar" onclick="cerrarModal('modalPlataformas')">VOLVER</button></div></div>
    <div id="modalClientes" class="modal"><div class="modal-content"><h3>Clientes</h3><input type="text" id="cN" placeholder="Nombre"><input type="text" id="cW" placeholder="WhatsApp"><button class="btn-add" onclick="guardarCliente()">GUARDAR</button><div id="listaC"></div><button class="btn-cerrar" onclick="cerrarModal('modalClientes')">VOLVER</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, serverTimestamp, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userLogueado = { nombre: "", rol: "" };
        let userChat = { nick: localStorage.getItem('chatNick') || "", tel: localStorage.getItem('chatTel') || "" };
        let memberSeleccionadoId = "";

        window.validarAcceso = async () => {
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            if(e === "Andyobregon799@gmail.com" && p === "123456") { entrar("Andy (Admin)", "admin"); } 
            else {
                const q = query(collection(db, "usuarios"), where("correo", "==", e), where("clave", "==", p));
                const s = await getDocs(q);
                if(!s.empty) { const d = s.docs[0].data(); entrar(d.nombre, d.rol); } 
                else { alert("Datos incorrectos"); }
            }
        };

        function entrar(nombre, rol) {
            userLogueado.nombre = nombre; userLogueado.rol = rol;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('userTitle').innerText = nombre.toUpperCase();
            if(rol === 'admin') document.getElementById('menuAdminOnly').classList.remove('hidden');
        }

        window.abrirModal = (id, cb) => { document.getElementById(id).style.display = "block"; if(cb) cb(); };
        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";

        // --- GESTIÓN DE MIEMBROS (SOLO ADMIN) ---
        window.cargarTodosLosMiembros = async () => {
            const container = document.getElementById('fullMembersList');
            container.innerHTML = "Cargando...";
            const s = await getDocs(collection(db, "miembros_chat"));
            container.innerHTML = "";
            s.forEach(miembro => {
                const d = miembro.data();
                const div = document.createElement('div');
                div.className = 'member-card';
                div.innerHTML = `
                    <b>${d.nick}</b> (${d.tel})<br>
                    <small>Pedido: ${d.ultimoPedido || 'Ninguno'}</small><br>
                    <button class="btn-add" style="font-size:0.7rem; padding:5px; margin-top:5px" onclick="prepararPedido('${miembro.id}', '${d.nick}')">ANOTAR PEDIDO</button>
                `;
                container.appendChild(div);
            });
        };

        window.prepararPedido = (id, nombre) => {
            memberSeleccionadoId = id;
            document.getElementById('pedidoTitle').innerText = "Pedido para: " + nombre;
            document.getElementById('pedidoTexto').value = "";
            abrirModal('modalAnotarPedido');
        };

        window.guardarPedidoFirebase = async () => {
            const texto = document.getElementById('pedidoTexto').value;
            if(!texto) return;
            const ref = doc(db, "miembros_chat", memberSeleccionadoId);
            await updateDoc(ref, { ultimoPedido: texto });
            alert("Pedido anotado");
            cerrarModal('modalAnotarPedido');
            cargarTodosLosMiembros();
        };

        // --- LÓGICA DE CHAT ---
        window.checkChatAccess = () => {
            if(userChat.nick && userChat.tel) { abrirChat(); } 
            else { cargarListaPerfiles(); }
        };

        async function cargarListaPerfiles() {
            const listDiv = document.getElementById('profilesList');
            listDiv.innerHTML = "";
            abrirModal('modalProfiles');
            const s = await getDocs(collection(db, "miembros_chat"));
            s.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<b>${data.nick}</b><br><small>${data.tel}</small>`;
                item.onclick = () => seleccionarPerfil(data.nick, data.tel);
                listDiv.appendChild(item);
            });
        }

        window.seleccionarPerfil = (nick, tel) => {
            userChat.nick = nick; userChat.tel = tel;
            localStorage.setItem('chatNick', nick); localStorage.setItem('chatTel', tel);
            cerrarModal('modalProfiles'); abrirChat();
        };

        window.abrirRegistroNuevo = () => { cerrarModal('modalProfiles'); abrirModal('chatRegister'); };

        window.finalizarRegistroChat = async () => {
            const n = document.getElementById('chatNick').value;
            const t = document.getElementById('chatPhone').value;
            if(!n || !t) return alert("Completa los datos");
            await addDoc(collection(db, "miembros_chat"), { nick: n, tel: t, ultimoPedido: "" });
            seleccionarPerfil(n, t);
            cerrarModal('chatRegister');
        };

        function abrirChat() {
            document.getElementById('chatHeaderTitle').innerText = "Grupo: " + userChat.nick;
            abrirModal('modalChat');
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(50));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const estilo = (d.emisor === userChat.nick) ? 'msg-a' : 'msg-v';
                    box.innerHTML += `<div class="msg ${estilo}"><b>${d.emisor}</b>${d.msg}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.enviarMensaje = async () => {
            const m = document.getElementById('msgInput').value;
            if(!m) return;
            await addDoc(collection(db, "chat"), { emisor: userChat.nick, msg: m, fecha: serverTimestamp() });
            document.getElementById('msgInput').value = "";
        };

        // FUNCIONES ADMIN RESTANTES
        window.guardarUsuario = async () => { await addDoc(collection(db, "usuarios"), { nombre: document.getElementById('uN').value, correo: document.getElementById('uE').value, clave: document.getElementById('uP').value, rol: document.getElementById('uR').value }); cargarVendedores(); };
        window.cargarVendedores = async () => { const s = await getDocs(collection(db, "usuarios")); const list = document.getElementById('listaU'); list.innerHTML = ""; s.forEach(d => { list.innerHTML += `<div class='lista-info'>${d.data().nombre} (${d.data().rol})</div>`; }); };
        window.guardarPlataforma = async () => { await addDoc(collection(db, "productos"), { nombre: document.getElementById('pN').value, precio: document.getElementById('pP').value }); cargarPlataformas(); };
        window.cargarPlataformas = async () => { const s = await getDocs(collection(db, "productos")); const list = document.getElementById('listaP'); list.innerHTML = ""; s.forEach(d => { list.innerHTML += `<div class='lista-info'>${d.data().nombre} - $${d.data().precio}</div>`; }); };
        window.guardarCliente = async () => { await addDoc(collection(db, "clientes"), { nombre: document.getElementById('cN').value, whatsapp: document.getElementById('cW').value }); cargarClientes(); };
        window.cargarClientes = async () => { const s = await getDocs(collection(db, "clientes")); const list = document.getElementById('listaC'); list.innerHTML = ""; s.forEach(d => { list.innerHTML += `<div class='lista-info'>${d.data().nombre} (${d.data().whatsapp})</div>`; }); };
    </script>
</body>
</html>
