<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ANDY - CHAT FIX</title>
    <style>
        :root { --primary: #2563eb; --bg: #0b141a; --card-bg: #1e293b; --text: #f8fafc; --wa-msg-out: #005c4b; --wa-msg-in: #202c33; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        #chatBox { background: #0b141a; height: 450px; overflow-y: auto; padding: 15px; border-radius: 8px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; max-width: 85%; position: relative; cursor: pointer; }
        .msg-a { background: var(--wa-msg-out); align-self: flex-end; }
        .msg-v { background: var(--wa-msg-in); align-self: flex-start; }
        .reply-box { background: rgba(0,0,0,0.3); padding: 5px; border-left: 3px solid #22c55e; margin-bottom: 5px; font-size: 0.75rem; border-radius: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 10px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-ok { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div style="height:90vh; display:flex; justify-content:center; align-items:center;">
            <div class="modal-content" style="text-align:center; width:100%;">
                <h2>SISTEMA ANDY</h2>
                <input type="email" id="logEmail" placeholder="Correo">
                <input type="password" id="logPass" placeholder="Clave">
                <button class="btn-ok" onclick="validarAcceso()">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <h3 id="welcomeUser" style="text-align:center;">PANEL</h3>
        <button class="btn-ok" onclick="checkChatAccess()" style="height:100px; font-size:1.5rem;">💬 ENTRAR AL CHAT VIP</button>
        <button onclick="location.reload()" style="background:#ef4444; margin-top:20px;">SALIR</button>
    </div>

    <div id="modalChat" class="modal">
        <div class="modal-content" style="height: 95vh; display: flex; flex-direction: column; padding: 10px;">
            <div id="chatBox"></div>
            
            <div id="replyPreview" class="hidden" style="background:#1e293b; padding:8px; border-left:4px solid #22c55e; margin-top:5px;">
                <small id="replyTxt" style="color: #22c55e;"></small>
                <button onclick="cancelarRespuesta()" style="width:25px; float:right; background:none; color:red; padding:0; font-size:1.2rem;">×</button>
            </div>

            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" id="msgInput" placeholder="Escribe mensaje...">
                <button class="btn-ok" style="width:70px;" id="btnEnviar">OK</button>
            </div>
            <button onclick="cerrarModal('modalChat')" style="background:#334155; margin-top:10px;">VOLVER</button>
        </div>
    </div>

    <div id="modalProfiles" class="modal">
        <div class="modal-content">
            <h3>¿Quién eres?</h3>
            <div id="profilesList" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGE5GTlwIypuryIVnDYiTR9a2wyCgWkfs",
            authDomain: "gestion-ventas-pro-f8de4.firebaseapp.com",
            projectId: "gestion-ventas-pro-f8de4",
            storageBucket: "gestion-ventas-pro-f8de4.firebasestorage.app",
            messagingSenderId: "96449660649",
            appId: "1:96449660649:web:d949eccf893c9705451278"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userChat = { id: localStorage.getItem('chatUserId') || "", nick: localStorage.getItem('chatNick') || "" };
        let respuestaActiva = null;

        // ACCESO
        window.validarAcceso = () => {
            const c = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            if(c === "Andyobregon799@gmail.com" && p === "123456") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            } else { alert("Acceso denegado"); }
        };

        window.checkChatAccess = () => { if(userChat.id) abrirChat(); else cargarPerfiles(); };

        async function cargarPerfiles() {
            const list = document.getElementById('profilesList');
            list.innerHTML = "Cargando miembros...";
            document.getElementById('modalProfiles').style.display = "block";
            try {
                const s = await getDocs(collection(db, "miembros_chat"));
                list.innerHTML = "";
                s.forEach(d => {
                    const b = document.createElement('button');
                    b.className = "btn-ok";
                    b.style.background = "#334155";
                    b.innerText = d.data().nick;
                    b.onclick = () => {
                        userChat = { id: d.id, nick: d.data().nick };
                        localStorage.setItem('chatUserId', d.id);
                        localStorage.setItem('chatNick', d.data().nick);
                        document.getElementById('modalProfiles').style.display = "none";
                        abrirChat();
                    };
                    list.appendChild(b);
                });
            } catch(e) { alert("Error cargando perfiles"); }
        }

        function abrirChat() {
            document.getElementById('modalChat').style.display = "block";
            const q = query(collection(db, "chat"), orderBy("fecha", "asc"), limit(60));
            
            onSnapshot(q, (sn) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                sn.forEach(docS => {
                    const d = docS.data();
                    const esMio = d.emisorId === userChat.id;
                    const div = document.createElement('div');
                    div.className = `msg ${esMio ? 'msg-a' : 'msg-v'}`;
                    div.onclick = () => window.prepararRespuesta(d.emisor, d.msg);
                    
                    let html = `<b style="font-size:0.65rem; color:#ffa500; display:block; margin-bottom:2px;">${d.emisor}</b>`;
                    if(d.respA) {
                        html += `<div class="reply-box"><b>${d.respA}</b><br>${d.respM}</div>`;
                    }
                    html += `<span>${d.msg}</span>`;
                    
                    div.innerHTML = html;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // FUNCIÓN ENVIAR (DENTRO DEL MÓDULO)
        const enviarMensaje = async () => {
            const input = document.getElementById('msgInput');
            const texto = input.value.trim();
            if(!texto) return;

            const m = {
                emisor: String(userChat.nick),
                emisorId: String(userChat.id),
                msg: String(texto),
                fecha: serverTimestamp()
            };

            if (respuestaActiva) {
                m.respA = String(respuestaActiva.autor);
                m.respM = String(respuestaActiva.msg);
            }

            input.value = "";
            window.cancelarRespuesta();

            try {
                await addDoc(collection(db, "chat"), m);
            } catch(e) {
                console.error(e);
                alert("Error al enviar mensaje");
            }
        };

        // Asignar eventos a botones y teclado
        document.getElementById('btnEnviar').onclick = enviarMensaje;
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') enviarMensaje();
        });

        window.prepararRespuesta = (a, m) => {
            respuestaActiva = { autor: a, msg: m };
            document.getElementById('replyTxt').innerText = "Respondiendo a " + a;
            document.getElementById('replyPreview').classList.remove('hidden');
            document.getElementById('msgInput').focus();
        };

        window.cancelarRespuesta = () => {
            respuestaActiva = null;
            document.getElementById('replyPreview').classList.add('hidden');
        };

        window.cerrarModal = (id) => document.getElementById(id).style.display = "none";
    </script>
</body>
</html>
